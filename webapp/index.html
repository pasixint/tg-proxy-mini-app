<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoProxy</title>
    <!-- Подключаем официальный SDK Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #fa054a;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(250, 5, 74, 0.15);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Размытый неоновый фон */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-color) 0%, rgba(250, 5, 74, 0) 70%);
            opacity: 0.35;
            filter: blur(70px);
            z-index: 1;
            pointer-events: none;
        }
        body::before { top: -60px; right: -60px; }
        body::after { bottom: -60px; left: -60px; }

        /* Контейнер для страниц */
        .page {
            display: none;
            width: 100%;
            max-width: 340px;
            z-index: 10;
            position: relative;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Карточки */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px 24px;
            border-radius: 28px;
            box-shadow: 0 0 40px rgba(250, 5, 74, 0.03);
            text-align: center;
            width: 100%;
        }

        /* Общие стили для картинок-логотипов вместо эмодзи */
        .logo-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 12px rgba(250, 5, 74, 0.3));
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 1px;
            margin-bottom: 14px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            opacity: 0.6;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* Кнопка Перейти (Страница 1) */
        .btn-next {
            display: block;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 25px rgba(250, 5, 74, 0.35);
            transition: all 0.2s ease;
        }
        .btn-next:active { transform: scale(0.97); }

        /* КРУГЛАЯ КНОПКА ВКЛЮЧЕНИЯ */
        .pulse-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 35px 0 40px 0; /* Слегка увеличили отступы */
        }

        .btn-connect {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(250, 5, 74, 0.6) 0%, rgba(130, 2, 36, 0.5) 100%);
            border: 1px solid rgba(250, 5, 74, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(250, 5, 74, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            position: relative;
        }

        .btn-connect:active {
            transform: scale(0.94);
            box-shadow: 0 0 60px rgba(250, 5, 74, 0.6), inset 0 0 25px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, rgba(250, 5, 74, 0.8) 0%, rgba(130, 2, 36, 0.7) 100%);
        }

        .btn-connect svg {
            width: 42px;
            height: 42px;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px rgba(250, 5, 74, 0.6));
        }

        /* СЕЛЕКТОР ПРОКСИ */
        .select-wrapper {
            margin-top: 20px;
            text-align: left;
        }

        .select-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.4;
            margin-bottom: 6px;
            display: block;
            padding-left: 4px;
        }

        .proxy-select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23fa054a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            transition: border 0.2s ease;
        }

        .proxy-select:focus {
            border-color: var(--accent-color);
        }

        .proxy-select option {
            background-color: #111111;
            color: #ffffff;
        }

        /* Кнопка назад */
        .btn-back {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 20px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- СТРАНИЦА 1: ГЛАВНАЯ -->
    <div id="pageMain" class="page active">
        <div class="card">
            <!-- Айфоновский 3D осьминог высокого разрешения -->
            <img src="https://em-content.zobj.net/source/apple/391/octopus_1f419.png" class="logo-img float-animation" alt="Octopus">
            <h2>OctoProxy</h2>
            <p>Добро пожаловать в конфигуратор сети. Перейдите к панели управления для настройки защищенного соединения.</p>
            <button class="btn-next" onclick="navigateTo('pageConnect')">Перейти</button>
        </div>
    </div>

    <!-- СТРАНИЦА 2: ПОДКЛЮЧЕНИЕ -->
    <div id="pageConnect" class="page">
        <button class="btn-back" onclick="navigateTo('pageMain')">← Назад</button>
        
        <div class="card">
            <!-- Тот же айфоновский осьминог для единства стиля вместо щита -->
            <img src="https://em-content.zobj.net/source/apple/391/octopus_1f419.png" class="logo-img" alt="Octopus">
            <!-- Заменили CONTROL PANEL на название твоего приложения -->
            <h2>OctoProxy</h2>
            <p>Выбери локацию из списка ниже и нажми центральную кнопку для активации.</p>
            
            <!-- ОГРОМНАЯ КРУГЛАЯ КНОПКА ВКЛЮЧЕНИЯ -->
            <div class="pulse-container">
                <button class="btn-connect" id="connectBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2V12" />
                        <path d="M18.36 6.64001C19.3821 7.66299 20.0763 8.99599 20.3541 10.4688C20.6319 11.9417 20.4811 13.4617 19.9213 14.8344C19.3614 16.2071 18.4231 17.3616 17.228 18.1511C16.033 18.9406 14.6433 19.3245 13.2371 19.2539C11.8308 19.1833 10.4782 18.6617 9.35368 17.7554C8.22912 16.8492 7.38712 15.6015 6.93512 14.1714C6.48312 12.7413 6.44431 11.2014 6.82361 9.749C7.2029 8.29661 7.9813 6.99965 9.06 6.02001" />
                    </svg>
                </button>
            </div>

            <!-- СЕЛЕКТОР ПРОКСИ -->
            <div class="select-wrapper">
                <span class="select-label">Выберите сервер прокси:</span>
                <select id="proxySelect" class="proxy-select">
                    <option value="proxy1">🚀 Сервер #1 (Основной)</option>
                    <option value="proxy2">⚡ Сервер #2 (Резервный)</option>
                    <option value="proxy3">💎 Сервер #3 (Премиум)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        const PROXY_LIST = {
            proxy1: { server: "166.0.124.115", port: "4515", secret: "eee9a4f23b1d768c04a8d7f39120ca5b6e6d656469612e737465616d706f77657265642e636f6d" },
            proxy2: { server: "твой_сервер_2", port: "твой_порт_2", secret: "твой_секрет_2" },
            proxy3: { server: "твой_сервер_3", port: "твой_порт_3", secret: "твой_секрет_3" }
        };

        document.getElementById('connectBtn').addEventListener('click', () => {
            const selectedProxyKey = document.getElementById('proxySelect').value;
            const proxyData = PROXY_LIST[selectedProxyKey];

            if (proxyData.server.includes("твой_сервер")) {
                alert("Пожалуйста, сначала укажите реальные данные прокси в коде скрипта!");
                return;
            }

            const proxyUrl = `https://t.me/proxy?server=${proxyData.server}&port=${proxyData.port}&secret=${proxyData.secret}`;
            tg.openTelegramLink(proxyUrl);
        });
    </script>
</body>
</html>
