<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoProxy</title>
    <!-- Подключаем официальный SDK Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #17212b;
            --tg-theme-text-color: #f5f5f5;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            max-width: 300px;
            width: 100%;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
        }

        p {
            font-size: 14px;
            opacity: 0.7;
            margin: 0 0 24px 0;
            line-height: 1.4;
        }

        .btn {
            display: block;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            text-decoration: none;
            transition: transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🐙</div>
        <h2>OctoProxy v1.0</h2>
        <p>Нажми на кнопку ниже, чтобы автоматически применить настройки прокси к твоему Telegram-аккаунту.</p>
        
        <!-- КНОПКА ПОДКЛЮЧЕНИЯ -->
        <button class="btn" id="connectBtn">Подключить прокси</button>
    </div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем ТГ, что аппка загрузилась
        tg.expand(); // Раскрываем приложение на максимум

        // ТВОИ ДАННЫЕ ПРОКСИ (Впиши свои вместо заглушек)
        const PROXY_SERVER = "166.0.124.115";
        const PROXY_PORT = "4515";
        const PROXY_SECRET = "eee9a4f23b1d768c04a8d7f39120ca5b6e6d656469612e737465616d706f77657265642e636f6d";

        document.getElementById('connectBtn').addEventListener('click', () => {
            // Формируем нативную ссылку для Телеграма
            const proxyUrl = `https://t.me/proxy?server=${PROXY_SERVER}&port=${PROXY_PORT}&secret=${PROXY_SECRET}`;
            
            // Используем метод SDK, который безопасно открывает ссылки внутри ТГ
            tg.openTelegramLink(proxyUrl);
        });
    </script>
</body>
</html>
