<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoProxy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #fa054a;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(250, 5, 74, 0.15);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Размытый неоновый фон */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-color) 0%, rgba(250, 5, 74, 0) 70%);
            opacity: 0.35;
            filter: blur(70px);
            z-index: 1;
            pointer-events: none;
        }
        body::before { top: -60px; right: -60px; }
        body::after { bottom: -60px; left: -60px; }

        /* Контейнер для страниц */
        .page {
            display: none;
            width: 100%;
            max-width: 340px;
            z-index: 10;
            position: relative;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Карточки */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px 24px;
            border-radius: 28px;
            box-shadow: 0 0 40px rgba(250, 5, 74, 0.03);
            text-align: center;
            width: 100%;
        }

        /* Общие стили для картинок-логотипов вместо эмодзи */
        .logo-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 12px rgba(250, 5, 74, 0.3));
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 1px;
            margin-bottom: 14px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            opacity: 0.6;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* Кнопка Перейти (Страница 1) */
        .btn-next {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 25px rgba(250, 5, 74, 0.35);
            transition: all 0.2s ease;
        }
        .btn-next:active { transform: scale(0.97); }
        .btn-next svg { width: 18px; height: 18px; fill: #ffffff; }

        /* КРУГЛАЯ КНОПКА ВКЛЮЧЕНИЯ */
        .pulse-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 35px 0 35px 0;
        }

        .btn-connect {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(250, 5, 74, 0.6) 0%, rgba(130, 2, 36, 0.5) 100%);
            border: 1px solid rgba(250, 5, 74, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(250, 5, 74, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            position: relative;
        }

        .btn-connect:active {
            transform: scale(0.94);
            box-shadow: 0 0 60px rgba(250, 5, 74, 0.6), inset 0 0 25px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, rgba(250, 5, 74, 0.8) 0%, rgba(130, 2, 36, 0.7) 100%);
        }

        /* СТИЛЬ КНОПКИ ПРИ ТРЕБОВАНИИ ПОДПИСКИ (Цвет Telegram) */
        .btn-connect.sub-required {
            background: linear-gradient(135deg, rgba(36, 129, 204, 0.7) 0%, rgba(16, 73, 117, 0.6) 100%);
            border: 1px solid rgba(36, 129, 204, 0.4);
            box-shadow: 0 0 40px rgba(36, 129, 204, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .btn-connect.sub-required:active {
            background: linear-gradient(135deg, rgba(36, 129, 204, 0.9) 0%, rgba(16, 73, 117, 0.8) 100%);
            box-shadow: 0 0 60px rgba(36, 129, 204, 0.5);
        }

        /* ЗНАЧОК ВЫКЛЮЧАТЕЛЯ */
        .btn-connect svg {
            width: 46px;
            height: 46px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.2));
        }

        /* КАСТОМНЫЕ СЕЛЕКТОРЫ С ИКОНКАМИ */
        .select-wrapper {
            margin-top: 16px;
            text-align: left;
        }

        .select-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .select-header svg {
            width: 14px;
            height: 14px;
            fill: var(--accent-color);
            opacity: 0.8;
        }

        .select-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.4;
        }

        .custom-select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23fa054a' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            transition: border 0.2s ease;
        }

        .custom-select:focus {
            border-color: var(--accent-color);
        }

        .custom-select option {
            background-color: #111111;
            color: #ffffff;
        }

        /* Кнопка назад */
        .btn-back {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }
        .btn-back:active { opacity: 0.5; }
        .btn-back svg { width: 14px; height: 14px; fill: var(--accent-color); }
    </style>
</head>
<body>

    <div id="pageMain" class="page active">
        <div class="card">
            <img src="https://em-content.zobj.net/source/apple/391/octopus_1f419.png" class="logo-img float-animation" alt="Octopus">
            <h2>OctoProxy</h2>
            <p id="mainDesc">Добро пожаловать в конфигуратор сети. Перейдите к панели управления для настройки защищенного соединения.</p>
            <button class="btn-next" id="nextBtn" onclick="navigateTo('pageConnect')">
                <span id="nextBtnText">Перейти</span>
                <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43a1 1 0 0 0 1.42 1.42l7.14-7.14a1 1 0 0 0 0-1.42l-7.14-7.14a1 1 0 0 0-1.42 1.42L16.86 11H5a1 1 0 0 0 0 2z"/></svg>
            </button>
            <div class="select-wrapper">
                <div class="select-header">
                    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm7.92 9h-4.06a14.33 14.33 0 0 0-1.46-6.13A8 8 0 0 1 19.92 11zM12 4a12.4 12.4 0 0 1 2.14 7H9.86A12.4 12.4 0 0 1 12 4zM4.08 11a8 8 0 0 1 5.52-6.13A14.33 14.33 0 0 0 8.14 11zm-.08 2h4.06a14.33 14.33 0 0 0 1.46 6.13A8 8 0 0 1 4.08 13zm7.92 7a12.4 12.4 0 0 1-2.14-7h4.28A12.4 12.4 0 0 1 12 20zm7.92-7a8 8 0 0 1-5.52 6.13 14.33 14.33 0 0 0 1.46-6.13z"/></svg>
                    <span class="select-label" id="labelLang">Язык / Language / Idioma:</span>
                </div>
                <select id="langSelect" class="custom-select" onchange="changeLanguage(this.value)">
                    <option value="ru">🇷🇺 Русский</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
            </div>
        </div>
    </div>

    <div id="pageConnect" class="page">
        <button class="btn-back" id="backBtn" onclick="navigateTo('pageMain')">
            <svg viewBox="0 0 24 24"><path d="M19 11H7.14l5.43-5.43a1 1 0 0 0-1.42-1.42l-7.14 7.14a1 1 0 0 0 0 1.42l7.14 7.14a1 1 0 0 0 1.42-1.42L7.14 13H19a1 1 0 0 0 0-2z"/></svg>
            <span id="backBtnText">Назад</span>
        </button>
        
        <div class="card">
            <img src="https://em-content.zobj.net/source/apple/391/octopus_1f419.png" class="logo-img" alt="Octopus">
            <h2>OctoProxy</h2>
            <p id="connectDesc">Выбери локацию из списка ниже и нажми центральную кнопку для активации.</p>
            
            <div class="pulse-container">
                <button class="btn-connect" id="connectBtn">
                    <svg id="connectIcon" viewBox="0 0 24 24"></svg>
                </button>
            </div>

            <div class="select-wrapper">
                <div class="select-header">
                    <svg viewBox="0 0 24 24"><path d="M19 2H5a3 3 0 0 0-3 3v4a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V5a3 3 0 0 0-3-3zm-1 6h-2a1 1 0 0 1 0-2h2a1 1 0 0 1 0 2zm1 6H5a3 3 0 0 0-3 3v4a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3v-4a3 3 0 0 0-3-3zm-1 6h-2a1 1 0 0 1 0-2h2a1 1 0 0 1 0 2z"/></svg>
                    <span class="select-label" id="labelProxy">Выберите сервер прокси:</span>
                </div>
                <select id="proxySelect" class="custom-select">
                    <option value="proxy1" id="optProxy1">🚀 Сервер #1 (Основной)</option>
                    <option value="proxy2" id="optProxy2">⚡ Сервер #2 (Резервный)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('rgba(250, 5, 74, 0.8)');
        tg.setBackgroundColor('#000000');

        // Tg link
        const CHANNEL_LINK = "https://t.me/OctoProxyTG";

        // Проверяем статус подписки из локальной памяти
        let isSubscribed = localStorage.getItem('isSubscribed') === 'true';

        // Словарь переводов
        const translations = {
            ru: {
                mainDesc: "Добро пожаловать в конфигуратор сети. Перейдите к панели управления для настройки защищенного соединения.",
                nextBtnText: "Перейти",
                backBtnText: "Назад",
                connectDescSub: "Для активации прокси, пожалуйста, подпишитесь на наш канал, нажав на центральную кнопку.",
                connectDescReady: "Вы успешно выполнили условия! Выберите локацию и нажмите кнопку для активации.",
                labelProxy: "Выберите сервер прокси:",
                optProxy1: "🚀 Сервер #1 (Основной)",
                optProxy2: "⚡ Сервер #2 (Резервный)",
                labelLang: "Язык / Language / Idioma:",
                alertSetup: "Пожалуйста, сначала укажите реальные данные прокси в коде скрипта!"
            },
            en: {
                mainDesc: "Welcome to the network configurator. Go to the control panel to set up a secure connection.",
                nextBtnText: "Continue",
                backBtnText: "Back",
                connectDescSub: "To activate the proxy, please subscribe to our channel by pressing the central button.",
                connectDescReady: "Conditions met successfully! Select a location and press the button to activate.",
                labelProxy: "Select proxy server:",
                optProxy1: "🚀 Server #1 (Primary)",
                optProxy2: "⚡ Server #2 (Backup)",
                labelLang: "Language:",
                alertSetup: "Please specify real proxy data in the script code first!"
            },
            es: {
                mainDesc: "Bienvenido al configurador de red. Vaya al panel de control para configurar una conexión segura.",
                nextBtnText: "Continuar",
                backBtnText: "Atrás",
                connectDescSub: "Para activar el proxy, suscríbase a nuestro canal presionando el botón central.",
                connectDescReady: "¡Condiciones cumplidas con éxito! Seleccione una ubicación y presione el botón para activar.",
                labelProxy: "Seleccionar servidor proxy:",
                optProxy1: "🚀 Servidor #1 (Principal)",
                optProxy2: "⚡ Servidor #2 (Respaldo)",
                labelLang: "Idioma:",
                alertSetup: "¡Por favor, especifique los datos reales del proxy en el código primero!"
            }
        };

        // Обновление внешнего вида и логики кнопки на основе статуса подписки
        function updateButtonUI() {
            const btn = document.getElementById('connectBtn');
            const icon = document.getElementById('connectIcon');
            const currentLang = document.getElementById('langSelect').value;

            if (!isSubscribed) {
                // Если подписки нет — красим в цвет Telegram, просим подписаться
                btn.classList.add('sub-required');
                document.getElementById('connectDesc').textContent = translations[currentLang].connectDescSub;
                // Иконка человечка с плюсом (+) в стиле Streamline Bold
                icon.innerHTML = `
                    <path d="M19 11h-2V9a1 1 0 0 0-2 0v2h-2a1 1 0 0 0 0 2h2v2a1 1 0 0 0 2 0v-2h2a1 1 0 0 0 0-2z" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M9 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0-6a2 2 0 1 1-2 2 2 2 0 0 1 2-2zm0 8a7 7 0 0 0-7 7 1 1 0 0 0 1 1h12a1 1 0 0 0 1-1 7 7 0 0 0-7-7zm-4.9 6a5 5 0 0 1 9.8 0z" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                `;
            } else {
                // Если подписан — красим в розовый акцент, иконка питания активна
                btn.classList.remove('sub-required');
                document.getElementById('connectDesc').textContent = translations[currentLang].connectDescReady;
                // Твой фиксированный чёткий выключатель
                icon.innerHTML = `
                    <line x1="12" y1="3" x2="12" y2="11" />
                    <path d="M18.4 6.5a9 9 0 1 1-12.8 0" />
                `;
            }
        }

        // Функция смены языка
        function changeLanguage(lang) {
            localStorage.setItem('selectedLang', lang);
            document.getElementById('langSelect').value = lang;

            // Применяем тексты
            document.getElementById('mainDesc').textContent = translations[lang].mainDesc;
            document.getElementById('nextBtnText').textContent = translations[lang].nextBtnText;
            document.getElementById('backBtnText').textContent = translations[lang].backBtnText;
            document.getElementById('labelProxy').textContent = translations[lang].labelProxy;
            document.getElementById('optProxy1').textContent = translations[lang].optProxy1;
            document.getElementById('optProxy2').textContent = translations[lang].optProxy2;
            document.getElementById('labelLang').textContent = translations[lang].labelLang;

            updateButtonUI();
        }

        // Инициализация языка (берём из сохраненных или по умолчанию русский)
        const savedLang = localStorage.getItem('selectedLang') || 'ru';
        changeLanguage(savedLang);

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        const PROXY_LIST = {
            proxy1: { server: "166.0.124.115", port: "4515", secret: "eee9a4f23b1d768c04a8d7f39120ca5b6e6d656469612e737465616d706f77657265642e636f6d" },
            proxy2: { server: "fast1.mtproxy.zip", port: "443", secret: "ee3f8a91c2d7e04b6a9f12c5e8370bd4aa786170692e6f7a6f6e2e7275" }
        };

        // Логика клика по круглой кнопке
        document.getElementById('connectBtn').addEventListener('click', () => {
            const currentLang = document.getElementById('langSelect').value;

            // ШАГ 1: Если подписки нет — перенаправляем на канал и активируем "готовность"
            if (!isSubscribed) {
                tg.openTelegramLink(CHANNEL_LINK);
                isSubscribed = true;
                localStorage.setItem('isSubscribed', 'true');
                updateButtonUI();
                return;
            }

            // ШАГ 2: Если подписка пройдена — запускаем прокси
            const selectedProxyKey = document.getElementById('proxySelect').value;
            const proxyData = PROXY_LIST[selectedProxyKey];

            if (proxyData.server.includes("твой_сервер")) {
                alert(translations[currentLang].alertSetup);
                return;
            }

            const proxyUrl = `https://t.me/proxy?server=${proxyData.server}&port=${proxyData.port}&secret=${proxyData.secret}`;
            tg.openTelegramLink(proxyUrl);
        });
    </script>
</body>
</html>
